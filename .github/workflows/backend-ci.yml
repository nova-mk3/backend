name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      MYSQL_DATABASE: test_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_pw
      MYSQL_ROOT_PASSWORD: test_root_pw
      MYSQL_HOST: 127.0.0.1
      MYSQL_IN_PORT: 3306
      MYSQL_EX_PORT: 3307
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      SPRING_PROFILE_ACTIVE: test
      SPRING_APP_PORT: 4001
      FILE_STORAGE_PATH: /tmp/test-storage
      JWT_SECRET_KEY: dummysecret
      EMAIL_ADDRESS: test@example.com
      EMAIL_PASSWORD: 1234
      BASE_PROFILE_IMAGE_NAME: default.png
      ADMIN_STUDENT_NUMBER: 12345678
      ADMIN_PASSWORD: 1234

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pw
          MYSQL_ROOT_PASSWORD: test_root_pw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest_root_pw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Build JAR
        run: ./gradlew bootJar --no-daemon